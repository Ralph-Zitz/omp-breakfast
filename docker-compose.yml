services:
  breakfast:
    build:
      dockerfile: Dockerfile.breakfast
    ports:
      - 8080:8080
    links:
      - postgres
    hostname: localhost
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "1"
    environment:
      - BREAKFAST_PG_HOST=postgres
      - BREAKFAST_PG_USER=actix
      - BREAKFAST_PG_PASSWORD=actix
      - ENV=development
  postgres:
    build:
      dockerfile: Dockerfile.postgres
    hostname: localhost
    security_opt:
      - no-new-privileges:true
    command: >
      -c ssl=on
      -c ssl_ca_file=/var/lib/postgresql/ca-cert.crt
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actix"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      POSTGRES_PASSWORD: actix
      POSTGRES_USER: actix
      POSTGRES_DB: actix
    ports:
      - 127.0.0.1:5432:5432
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "1"
