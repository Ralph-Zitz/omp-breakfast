services:
  breakfast:
    build:
      dockerfile: Dockerfile.breakfast
    ports:
      - 8080:8080
    links:
      - postgres
    hostname: localhost
    restart: always
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      postgres-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "1"
    environment:
      - BREAKFAST_PG_HOST=postgres
      - BREAKFAST_PG_USER=actix
      - BREAKFAST_PG_PASSWORD=actix
      - ENV=development
  postgres-setup:
    image: postgres:18.3
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    links:
      - postgres
    entrypoint: ["bash", "/init_dev_db.sh"]
    volumes:
      - ./database_seed.sql:/database_seed.sql
      - ./init_dev_db.sh:/init_dev_db.sh
      - ./migrations:/migrations
  postgres:
    build:
      dockerfile: Dockerfile.postgres
    hostname: localhost
    command: >
      -c ssl=on
      -c ssl_ca_file=/var/lib/postgresql/ca-cert.crt
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      POSTGRES_PASSWORD: actix
      POSTGRES_USER: actix
      POSTGRES_DB: actix
    ports:
      - 127.0.0.1:5432:5432
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "1"
